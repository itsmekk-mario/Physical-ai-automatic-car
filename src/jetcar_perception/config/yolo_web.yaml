yolo_web_node:
  ros__parameters:
    host: 0.0.0.0
    port: 8080
    # Use "csi" for Jetson CSI cameras through nvarguscamerasrc.
    # Use "0" or another device index for a USB V4L2 camera.
    camera_source: csi
    camera_backend: auto
    camera_sensor_id: 0
    camera_flip_method: 0
    model_path: auto
    target_classes:
      - person
      - car
      - stop sign
    confidence_threshold: 0.4
    image_size: 640
    publish_rate_hz: 5.0
    jpeg_quality: 80
    camera_width: 1280
    camera_height: 720
    camera_fps: 30
