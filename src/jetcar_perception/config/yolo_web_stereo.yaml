yolo_web_node:
  ros__parameters:
    host: 0.0.0.0
    port: 8081
    # C170 is the primary forward camera for UFLD and object recognition.
    camera_source: 0
    camera_backend: auto
    camera_sensor_id: 0
    camera_flip_method: 0
    usb_fourcc: default
    model_path: /home/kown/jetcar_ws/models/yolov8n_int8.engine
    image_topic: ''
    primary_image_publish_topic: /sensors/c170/image_raw
    primary_frame_id: c170_optical_frame
    # Stereo remains auxiliary: lane cross-check and depth/distance.
    left_image_topic: /sensors/stereo/left/image_raw
    right_image_topic: /sensors/stereo/right/image_raw
    # all, *, or any means draw and publish every COCO class detected by YOLO.
    enable_object_detection: true
    target_classes:
      - all
    confidence_threshold: 0.25
    image_size: 320
    publish_rate_hz: 10.0
    jpeg_quality: 50
    camera_width: 1280
    camera_height: 720
    camera_fps: 60
    stream_width: 960
    stream_height: 540
    stream_delay_ms: 0
    camera_retry_sec: 1.5
    camera_read_failures_before_reopen: 5
    detection_rate_hz: 2.0
    inference_device: cuda:0
    prefer_half: true
    throttle_step: 0.1
    steering_step_cmd: 0.2
    cruise_default_throttle: 0.18
    cruise_max_throttle: 0.35
    manual_override_mode: MANUAL
    auto_switch_mode_on_manual_input: true
    draw_lane_overlay: true
    lane_overlay_roi_top_fraction: 0.55
    lane_overlay_min_pixels: 80
    lane_overlay_expected_width_px: 180.0
