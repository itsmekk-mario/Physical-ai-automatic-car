lane_detection_node:
  ros__parameters:
    publish_rate_hz: 10.0
    lane_center_offset_m: 0.0
    heading_error_deg: 0.0
    lane_confidence: 0.9
    assist_gain: 1.4
    # C170 primary camera is published by yolo_web_node when camera_source is USB.
    image_topic: /sensors/c170/image_raw
    meters_per_pixel: 0.0025
    roi_top_fraction: 0.58
    min_lane_pixels: 150
    max_frame_age_sec: 0.5
    expected_lane_width_px: 280.0
    heading_gain: 0.25
    max_heading_error_deg: 30.0
    detector_backend: ufld
    model_path: /home/kown/jetcar_ws/models/ufld_culane.torchscript.pt
    confidence_threshold: 0.25
    image_size: 320
    inference_device: cuda:0
    prefer_half: true
    yolo_class_name: ''
    yolo_min_mask_pixels: 80
    ufld_runtime: auto
    ufld_model_type: culane
    ufld_input_width: 800
    ufld_input_height: 288
    ufld_griding_num: 200
    ufld_lane_indices: [1, 2]
    ufld_row_anchors: [121, 131, 141, 150, 160, 170, 180, 189, 199, 209, 219, 228, 238, 248, 258, 267, 277, 287]
    ufld_min_lane_points: 4
    ufld_presence_threshold: 0.5
    ufld_normalize_mean: [0.485, 0.456, 0.406]
    ufld_normalize_std: [0.229, 0.224, 0.225]
