stereo_camera_node:
  ros__parameters:
    left_camera_name: left_imx219
    right_camera_name: right_imx219
    left_frame_id: stereo_left_optical_frame
    right_frame_id: stereo_right_optical_frame
    left_topic: /sensors/stereo/left/image_raw
    right_topic: /sensors/stereo/right/image_raw
    left_camera_source: csi:0
    right_camera_source: csi:1
    camera_backend: auto
    camera_flip_method: 0
    flip_horizontal: false
    flip_vertical: true
    capture_width: 1280
    capture_height: 720
    image_width: 640
    image_height: 360
    fps: 30.0
    baseline_m: 0.06
    publish_rate_hz: 20.0
    max_frame_age_sec: 2.5
    camera_read_failures_before_reopen: 5
    capture_warmup_sec: 6.0
    camera_retry_sec: 1.0
    right_camera_start_delay_sec: 0.75
    left_sensor_mode: 4
    right_sensor_mode: 4
    publish_encoding: bgr8
